# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "amillion(main/master)" ]
  pull_request:
    branches: [ "amillion(main/master)" ]
  schedule:
    - cron: '37 16 * * 2'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: c-cpp
          build-mode: autobuild
        - language: csharp
          build-mode: none
        - language: go
          build-mode: autobuild
        - language: java-kotlin
          build-mode: none # This mode only analyzes Java. Set this to 'autobuild' or 'manual' to analyze Kotlin too.
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none
        - language: ruby
          build-mode: none
        - language: swift
          build-mode: autobuild
        # CodeQL supports the following values keywords for 'language': 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift'
        # Use `c-cpp` to analyze code written in C, C++ or both
        # Use 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # To learn more about changing the languages that are analyzed or customizing the build mode for your analysis,
        # see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning.
        # If you are analyzing a compiled language, you can modify the 'build-mode' for that language to customize how
        # your codebase is analyzed, see https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Add any setup steps before running the `github/codeql-action/init` action.
    # This includes steps like installing compilers or runtimes (`actions/setup-node`
    # or others). This is typically only required for manual builds.
    # - name: Setup runtime (example)
    #   uses: actions/setup-example@v1

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # For more details on CodeQL's query packs, refer to: https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    # If the analyze step fails for one of the languages you are analyzing with
    # "We were unable to automatically build your code", modify the matrix above
    # to set the build mode to "manual" for that language. Then modify this step
    # to build your code.
    # ℹ️ Command-line programs to run using the OS shell.
    # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
    - if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo 'If you are using a "manual" build mode for one or more of the' \
          'languages you are analyzing, replace this with the commands to build' \
          'your code, for example:'
        echo '  make bootstrap'
        echo '  make release'
        exit 1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
            - name: Setup Python
  uses: actions/setup-python@v5.6.0
  with:
    # Version range or exact version of Python or PyPy to use, using SemVer's version range syntax. Reads from .python-version if unset.
    python-version: # optional
    # File containing the Python version to use. Example: .python-version
    python-version-file: # optional
    # Used to specify a package manager for caching in the default directory. Supported values: pip, pipenv, poetry.
    cache: # optional
    # The target architecture (x86, x64, arm64) of the Python or PyPy interpreter.
    architecture: # optional
    # Set this option if you want the action to check for the latest available version that satisfies the version spec.
    check-latest: # optional
    # The token used to authenticate when fetching Python distributions from https://github.com/actions/python-versions. When running this action on github.com, the default value is sufficient. When running on GHES, you can pass a personal access token for github.com if you are experiencing rate limiting.
    token: # optional, default is ${{ github.server_url == 'https://github.com' && github.token || '' }}
    # Used to specify the path to dependency files. Supports wildcards or a list of file names for caching multiple dependencies.
    cache-dependency-path: # optional
    # Set this option if you want the action to update environment variables.
    update-environment: # optional, default is true
    # When 'true', a version range passed to 'python-version' input will match prerelease versions if no GA versions are found. Only 'x.y' version range is supported for CPython.
    allow-prereleases: # optional
    # When 'true', use the freethreaded version of Python.
    freethreaded: # optional
                 - name: serverless-python-node
  # You may pin to the exact commit or the version.
  # uses: doradodev/node-python-serverless@95869299012a9599925c884bbef8f3697d5c085e
  uses: doradodev/node-python-serverless@v1.1
         - name: Python Setup Environment
  uses: kassett/kassett-actions@master

                - name: Create Kubernetes Environment
  # You may pin to the exact commit or the version.
  # uses: cloudify-cosmo/kubernetes-action@1f771fa1badca9fa9727dd858103b23332c7a4ad
  uses: cloudify-cosmo/kubernetes-action@v1.3
  with:
    # Name of Cloudify environment to create
    environment-name: 
    # A labels list of the form <key>:<value>,<key>:<value>.
Any comma and colon in <value> must be escaped with \.
The labels’ keys are saved in lowercase.

    labels: # optional, default is -
    # Path to file containing GCP service account details
    gcp-credentials-file: # optional, default is -
    # Kubernetes API token
    token: # optional, default is -
    # Path to file containing an API token
    token-file: # optional, default is -
    # Hostname/IP of the main Kubernetes host
    master-host: 
    # Application's namespace
    namespace: # optional, default is -
    # Path to Kubernetes application definition file
    app-definition-file: # optional
    # Path, on Cloudify Manager, of a file to use as a CA trust store when connecting
to the Kubernetes master host

    ca-cert-file: # optional, default is -
    # Path, on Cloudify Manager, of a file to use as a certificate presented to the
Kubernetes master host upon connection

    ssl-cert-file: # optional, default is -
    # Path, on Cloudify Manager, of the private key file associated with the certificate
specified by `ssl-cert-file`

    ssl-key-file: # optional, default is -
    # Whether to verify SSL connections
    skip-ssl-verification: # optional, default is false
    # YAML/JSON file containing additional Kubernetes options, to be passed along
with the namespace

    other-options-file: # optional, default is -
    # Whether to validate the status of the application upon creation

    validate-status: # optional, default is false
    # Whether to allow Kubernetes node redefinition
    allow_node_redefinition: # optional, default is false
    # Whether to generate debug logging of Kubernetes calls
    debug: # optional, default is false
    # Path to JSON file to receive the Cloudify environment's outputs
and capabilities

    outputs-file: # optional, default is -
                  - name: Add debian repository
  # You may pin to the exact commit or the version.
  # uses: myci-actions/add-deb-repo@43408b9f0225d1c64ba667d59e337c6140383bbe
  uses: myci-actions/add-deb-repo@11
  with:
    # repository line as it appears in the sources.list
    repo: 
    # name of the repository, the name will be used for a new file in the /etc/apt/sources.list.d directory, the .list suffix will be added to the name
    repo-name: 
    # repository keys to import using apt-key
    keys: # optional
    # key server to import repository keys from, or direct URL to key if "keys" is not specified
    key-server: # optional
    # URL to ascii armored keys, the key is saved to /etc/apt/trusted.gpg.d/<repo-name>.asc
    keys-asc: # optional
    # perform 'apt update' after adding the repo
    update: # optional, default is true
    # space separated list of packages to install after adding the repo, update will be performed first
    install: # optional
                 - name: Dev Container Publish
  # You may pin to the exact commit or the version.
  # uses: devcontainers/action@528049dce833673f136ddfc09c2720d450029a6b
  uses: devcontainers/action@v1.4.2
  with:
    # Parse machine-readable (.json) configuration files and commit standardized documentation
    generate-docs: # optional, default is false
    # Disables validation of the schema of metadata files (devcontainer-feature.json)
    disable-schema-validation: # optional, default is false
    # Validate the schema of metadata files (devcontainer-feature.json) and exit without publishing. (Cannot be combined with any publishing step).
    validate-only: # optional, default is false
    # Disables adding a git repo tag for each Feature or Template release.
    disable-repo-tagging: # optional, default is false
    # Override the version of the devcontainer CLI to use. Defaults to the latest published version.
    devcontainer-cli-version: # optional, default is 
    # (true/false) Enable publishing Dev Container Feature(s). Cannot be combined with publish-templates.
    publish-features: # optional, default is false
    # Relative path to the folder containing Dev Container Feature(s)
    base-path-to-features: # optional, default is 
    # Name of the OCI registry that implements the OCI Artifact Distribution Specification
    oci-registry: # optional
    # Published Feature IDs will be prefixed with the namespace. If omitted, this value will default to the source repo name
    features-namespace: # optional
    # (true/false) Enable publishing Dev Container Template(s). Cannot be combined with publish-features.
    publish-templates: # optional, default is false
    # Relative path to the folder containing Dev Container Template(s)
    base-path-to-templates: # optional, default is 
    # Name of the OCI registry that implements the OCI Artifact Distribution Specification
    oci-registry-for-templates: # optional
    # Published Template IDs will be prefixed with the namespace. If omitted, this value will default to the source repo name
    templates-namespace: # optional
                                 
